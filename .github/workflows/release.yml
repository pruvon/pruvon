name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create dist directory
        run: mkdir -p dist

      - name: Build Linux AMD64
        env:
          GOOS: linux
          GOARCH: amd64
          CGO_ENABLED: 0
        run: go build -trimpath -ldflags="-s -w -X main.PruvonVersion=${{ steps.version.outputs.VERSION }}" -o dist/pruvon-linux-amd64 ./cmd/app

      - name: Build Linux ARM64
        env:
          GOOS: linux
          GOARCH: arm64
          CGO_ENABLED: 0
        run: go build -trimpath -ldflags="-s -w -X main.PruvonVersion=${{ steps.version.outputs.VERSION }}" -o dist/pruvon-linux-arm64 ./cmd/app

      - name: Package archives
        run: |
          cd dist
          tar -czf pruvon-linux-amd64.tar.gz pruvon-linux-amd64
          tar -czf pruvon-linux-arm64.tar.gz pruvon-linux-arm64

      - name: Create checksums
        run: |
          cd dist
          sha256sum pruvon-linux-amd64.tar.gz pruvon-linux-arm64.tar.gz > checksums.txt

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/pruvon-linux-amd64.tar.gz
            dist/pruvon-linux-arm64.tar.gz
            dist/checksums.txt
          body: |
            See [CHANGELOG.md](CHANGELOG.md) for release details.

            Included artifacts:
            - `pruvon-linux-amd64.tar.gz`
            - `pruvon-linux-arm64.tar.gz`
            - `checksums.txt`
