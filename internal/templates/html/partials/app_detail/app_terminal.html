{{define "app_terminal"}}
<div class="w-full min-w-0 max-w-full space-y-4">
    <div class="max-w-full overflow-hidden rounded-md border border-border bg-[#1A2B3C]">
        <div class="flex items-center justify-between gap-2 border-b border-[#3A322C] bg-[#2A241F] px-3 py-1.5">
            <div class="text-xs font-medium text-[#a8d5c2]">Terminal</div>
            <div class="flex items-center gap-2">
                <div class="mr-1 text-xs text-[#B8A898]" x-show="terminalConnected">
                    <span>Connected to application</span>
                </div>
                <button x-show="!terminalConnected"
                        @click.prevent="connectTerminal()"
                        class="inline-flex h-8 items-center gap-1.5 rounded border border-brand-primary bg-brand-primary px-3 text-sm font-medium text-white transition-colors duration-150 hover:bg-brand-hover">
                    <svg class="w-3 h-3 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path>
                    </svg>
                    Connect
                </button>
                <button x-show="terminalConnected"
                        @click.prevent="disconnectTerminal()"
                        class="inline-flex h-8 items-center gap-1.5 rounded border border-status-danger bg-status-danger px-3 text-sm font-medium text-white transition-colors duration-150 hover:bg-[#833530]">
                    <svg class="w-3 h-3 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                    </svg>
                    Disconnect
                </button>
            </div>
        </div>
        <div class="relative w-full max-w-full overflow-hidden">
            <div id="terminal" class="w-full max-w-full overflow-hidden p-2 font-mono text-xs" style="height: calc(100vh - 270px); min-height: 380px;"></div>
        </div>
    </div>
</div>
{{end}}
