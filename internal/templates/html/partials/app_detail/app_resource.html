{{define "app_resource"}}
<div x-data="{
    resourceLimits: {},
    systemInfo: {
        cpuCount: 0,
        totalMemory: ''
    },
    formData: {
        cpu: '',
        memory: ''
    },
    validation: {
        cpu: '',
        memory: ''
    },
    flashMessage: null,
    showFlash: false,
    async fetchResourceLimits() {
        try {
            const response = await fetch(`/api/apps/{{.Name}}/resource`);
            this.resourceLimits = await response.json();
            // Initialize form data with current values
            this.formData.cpu = this.resourceLimits.CPU || '';
            this.formData.memory = this.resourceLimits.Memory || '';
        } catch (error) {
            console.error('Error fetching resource limits:', error);
        }
    },
    async fetchSystemInfo() {
        try {
            const response = await fetch('/api/server/info');
            const info = await response.json();
            this.systemInfo.cpuCount = parseInt(info.cpu_cores);
            this.systemInfo.totalMemory = info.memory_total;
        } catch (error) {
            console.error('Error fetching system info:', error);
        }
    },
    validateCPU() {
        this.validation.cpu = '';
        if (!this.formData.cpu) return true;

        const value = parseFloat(this.formData.cpu);
        if (isNaN(value) || value <= 0) {
            this.validation.cpu = 'CPU limit must be a positive number';
            return false;
        }

        // CPU limit cannot exceed system CPUs
        if (this.systemInfo.cpuCount > 0 && value > this.systemInfo.cpuCount) {
            this.validation.cpu = `CPU limit cannot exceed system CPU count (${this.systemInfo.cpuCount})`;
            return false;
        }

        return true;
    },
    validateMemory(field) {
        this.validation[field] = '';
        const value = this.formData[field];
        if (!value) return true;

        // Check only for g and m units
        const regex = /^(\d+)([MG])$/i;
        const match = value.match(regex);
        if (!match) {
            this.validation[field] = 'Format must be like 300M or 1G';
            return false;
        }

        // Memory validation against system limit
        if (field === 'memory') {
            // Convert system memory format from '7.6 GB' to '7.6g'
            const normalizedSystemMemory = this.systemInfo.totalMemory
                .toLowerCase()
                .replace(/\s+/g, '')   // remove whitespace
                .replace(/gb/g, 'g')   // convert GB or gb to g
                .replace(/mb/g, 'm');  // convert MB or mb to m

            const systemMemory = normalizedSystemMemory.match(/^(\d+\.?\d*)(m|g)$/);
            if (systemMemory) {
                const inputValue = parseFloat(match[1]);
                const inputUnit = match[2].toLowerCase();
                const systemValue = parseFloat(systemMemory[1]);
                const systemUnit = systemMemory[2].toLowerCase();

                // Convert both values to gigabytes
                const inputGB = inputUnit === 'g' ? inputValue : inputValue / 1024;
                const systemGB = systemUnit === 'g' ? systemValue : systemValue / 1024;

                if (inputGB > systemGB) {
                    this.validation[field] = `Memory limit cannot exceed ${systemGB}g (system total memory)`;
                    return false;
                }
            }
        }

        // Additional validation: numeric value check
        const numValue = parseFloat(match[1]);
        if (isNaN(numValue) || numValue <= 0) {
            this.validation[field] = 'Memory value must be a positive number';
            return false;
        }

        return true;
    },
    async saveResourceLimits() {
        if (!this.validateCPU() || !this.validateMemory('memory')) {
            return;
        }

        try {
            const response = await fetch(`/api/apps/{{.Name}}/resource`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(this.formData)
            });

            const result = await response.json();

            if (response.ok) {
                this.resourceLimits = { ...this.formData };
                this.showFlashMessage(result.message || 'Resource limits updated successfully', 'success');
            } else {
                this.showFlashMessage(result.message || 'Failed to save resource limits', 'error');
                console.error('Failed to save resource limits', result);
            }
        } catch (error) {
            this.showFlashMessage('Error saving resource limits', 'error');
            console.error('Error saving resource limits:', error);
        }
    },
    showFlashMessage(message, type = 'success') {
        this.flashMessage = { text: message, type: type };
        this.showFlash = true;
        setTimeout(() => this.showFlash = false, 10000);
    }
}"
x-init="(async () => {
    await Promise.all([fetchSystemInfo(), fetchResourceLimits()]);
})()">
    <!-- Flash Message Component -->
    <div x-show="showFlash"
         x-transition:enter="transition ease-out duration-300"
         x-transition:enter-start="opacity-0 transform -translate-y-2"
         x-transition:enter-end="opacity-100 transform translate-y-0"
         x-transition:leave="transition ease-in duration-200"
         x-transition:leave-start="opacity-100 transform translate-y-0"
         x-transition:leave-end="opacity-0 transform -translate-y-2"
         class="mb-4"
         @click="showFlash = false">
        <div :class="{
            'border-status-success/30 bg-status-success-bg text-status-success': flashMessage?.type === 'success',
            'border-status-danger/30 bg-status-danger-bg text-status-danger': flashMessage?.type === 'error'
        }" class="rounded-md border px-4 py-3">
            <div class="flex">
                <div class="flex-shrink-0" x-show="flashMessage?.type === 'success'">
                    <svg class="h-5 w-5 text-status-success" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd" />
                    </svg>
                </div>
                <div class="flex-shrink-0" x-show="flashMessage?.type === 'error'">
                    <svg class="h-5 w-5 text-status-danger" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd" />
                    </svg>
                </div>
                <div class="ml-3">
                    <p class="text-sm" x-text="flashMessage?.text"></p>
                </div>
                <div class="ml-auto pl-3">
                    <div class="-mx-1.5 -my-1.5">
                        <button @click="showFlash = false"
                                 :class="{
                                     'text-status-success hover:text-status-success': flashMessage?.type === 'success',
                                     'text-status-danger hover:text-status-danger': flashMessage?.type === 'error'
                                 }"
                                 class="inline-flex rounded p-1.5 focus:outline-none">
                            <svg class="h-4 w-4" fill="currentColor" viewBox="0 0 20 20">
                                <path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd"></path>
                            </svg>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="space-y-4">
        <div class="rounded-md border border-border bg-card p-4">
            <div class="mb-3">
                <h3 class="text-sm font-semibold text-text-primary">Resource Limits</h3>
            </div>

            <!-- Form for setting resource limits -->
            <form @submit.prevent="saveResourceLimits" class="space-y-5">
                <div class="grid grid-cols-1 gap-4 md:grid-cols-2">
                    <div class="rounded-md border border-border bg-surface p-4">
                        <label class="block text-xs font-medium text-text-secondary">CPU Limit</label>
                        <div class="mt-1.5">
                            <input type="text"
                                   x-model="formData.cpu"
                                   @blur="validateCPU()"
                                   class="block h-8 w-full rounded border border-border bg-card px-3 text-sm text-text-primary placeholder:text-text-tertiary focus:border-brand-primary focus:outline-none focus:ring-1 focus:ring-brand-primary"
                                   placeholder="Enter CPU limit (e.g., 1.5)">
                        </div>
                        <p class="mt-1 text-xs text-status-danger" x-text="validation.cpu"></p>
                        <p class="mt-1 text-xs text-text-tertiary">Maximum allowed: <span x-text="systemInfo.cpuCount"></span> CPU cores</p>
                    </div>

                    <div class="rounded-md border border-border bg-surface p-4">
                        <label class="block text-xs font-medium text-text-secondary">Memory Limit</label>
                        <div class="mt-1.5">
                            <input type="text"
                                   x-model="formData.memory"
                                   @blur="validateMemory('memory')"
                                   class="block h-8 w-full rounded border border-border bg-card px-3 font-mono text-[13px] text-text-primary placeholder:text-text-tertiary focus:border-brand-primary focus:outline-none focus:ring-1 focus:ring-brand-primary"
                                   placeholder="Enter memory limit (e.g., 512M or 2G)">
                        </div>
                        <p class="mt-1 text-xs text-status-danger" x-text="validation.memory"></p>
                        <p class="mt-1 text-xs text-text-tertiary">System total memory: <span x-text="systemInfo.totalMemory"></span></p>
                    </div>
                </div>

                <div class="flex justify-end">
                    <button type="submit"
                            class="inline-flex h-8 items-center gap-1.5 rounded border border-brand-primary bg-brand-primary px-3 text-sm font-medium text-white transition-colors duration-150 hover:bg-brand-hover">
                        Save Changes
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{{end}}
