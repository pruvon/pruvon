{{define "app_cron"}}
<div class="space-y-4">
    <div class="flex items-center justify-between">
        <h3 class="text-sm font-semibold text-text-primary">Cron</h3>
        <button @click="fetchData('cron')"
                class="inline-flex h-7 w-7 items-center justify-center rounded text-text-secondary transition-colors duration-150 hover:bg-surface hover:text-text-primary">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15">
                </path>
            </svg>
        </button>
    </div>

    <template x-if="cronJobs?.length">
        <div class="overflow-hidden rounded-md border border-border bg-card">
            <div class="w-full overflow-x-auto">
                <table class="w-full text-sm">
                    <thead>
                        <tr class="border-b border-border">
                            <th class="px-4 py-2.5 text-left text-xs font-medium uppercase tracking-wide text-text-secondary">Schedule</th>
                            <th class="px-4 py-2.5 text-left text-xs font-medium uppercase tracking-wide text-text-secondary">Command</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-border-subtle">
                        <template x-for="job in cronJobs" :key="job.id">
                            <tr class="transition-colors duration-100 hover:bg-surface">
                                <td class="px-4 py-2.5 text-[13px] font-mono text-text-primary" x-text="job.schedule"></td>
                                <td class="px-4 py-2.5 text-[13px] font-mono text-text-secondary" x-text="job.command"></td>
                            </tr>
                        </template>
                    </tbody>
                </table>
            </div>
        </div>
    </template>

    <template x-if="!cronJobs?.length">
        <div class="rounded-md border border-border bg-card px-4 py-6 text-center text-sm text-text-secondary">No scheduled tasks found</div>
    </template>
</div>
{{end}}
