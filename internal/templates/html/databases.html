{{define "content"}}
<div x-data="{
    activeTab: 'postgres',
    databases: [],
    loading: false,
    flashMessage: null,
    showFlash: false,
    allDatabases: {{json .allDatabases}},
    allowedDatabasesByType: {{json .allowedDatabasesByType}},
    installedDbPlugins: [],
    async fetchInstalledPlugins() {
        try {
            const response = await fetch('/api/user-options');
            const data = await response.json();
            this.installedDbPlugins = data.installedDbPlugins || [];

            if (this.installedDbPlugins.length === 0) {
                return;
            }

            if (!this.installedDbPlugins.includes(this.activeTab)) {
                this.activeTab = this.installedDbPlugins[0];
            }

            await this.fetchDatabases(this.activeTab);
        } catch (error) {
            console.error('Error fetching installed plugins:', error);
        }
    },
    async fetchDatabases(type) {
        if (!this.installedDbPlugins.includes(type)) {
            console.error(`Database plugin ${type} is not installed`);
            return;
        }

        this.loading = true;
        this.databases = [];
        this.activeTab = type;

        const url = new URL(window.location.href);
        url.searchParams.set('type', type);
        window.history.replaceState({}, '', url);

        try {
            const response = await fetch(`/api/databases/${type}`);
            const data = await response.json();
            const tempDatabases = data.databases;

            const detailPromises = tempDatabases.map(db =>
                fetch(`/api/databases/${type}/${db.name}/info`)
                    .then(res => res.json())
                    .then(detailData => ({
                        ...db,
                        version: detailData.details?.Version || 'N/A',
                        status: detailData.details?.Status === 'running'
                    }))
            );

            this.databases = await Promise.all(detailPromises);
        } catch (error) {
            console.error('Error:', error);
            this.databases = [];
            this.showFlashMessage('Failed to load databases', 'error');
        } finally {
            this.loading = false;
        }
    },
    init() {
        const flashMessage = localStorage.getItem('flashMessage');
        const flashType = localStorage.getItem('flashType');
        if (flashMessage) {
            this.showFlashMessage(flashMessage, flashType || 'success');
            localStorage.removeItem('flashMessage');
            localStorage.removeItem('flashType');
        }

        this.fetchInstalledPlugins().then(() => {
            const urlParams = new URLSearchParams(window.location.search);
            const typeParam = urlParams.get('type');

            if (this.installedDbPlugins.length > 0) {
                if (typeParam && this.installedDbPlugins.includes(typeParam)) {
                    this.fetchDatabases(typeParam);
                } else if (this.installedDbPlugins.length > 0) {
                    this.fetchDatabases(this.installedDbPlugins[0]);
                }
            }
        });
    },
    showFlashMessage(message, type = 'success') {
        this.flashMessage = { text: message, type: type };
        this.showFlash = true;
        setTimeout(() => this.showFlash = false, 10000);
    }
}" x-init="init()" class="flex w-full max-w-6xl flex-col gap-6">
    <div x-show="showFlash"
         x-transition:enter="transition ease-out duration-150"
         x-transition:enter-start="opacity-0 translate-y-1"
         x-transition:enter-end="opacity-100 translate-y-0"
         x-transition:leave="transition ease-in duration-100"
         x-transition:leave-start="opacity-100 translate-y-0"
         x-transition:leave-end="opacity-0 translate-y-1"
         class="fixed top-4 right-4 z-50 max-w-sm"
         @click="showFlash = false"
         x-cloak>
        <div :class="flashMessage?.type === 'success' ? 'border-status-success text-status-success' : 'border-status-danger text-status-danger'"
             class="rounded-md border bg-card px-4 py-3 shadow-dropdown">
            <div class="flex items-start justify-between gap-3">
                <p class="text-sm" x-text="flashMessage?.text"></p>
                <button class="inline-flex h-7 w-7 items-center justify-center rounded text-text-tertiary transition-colors duration-150 hover:bg-surface hover:text-text-primary">
                    <svg class="h-4 w-4" fill="currentColor" viewBox="0 0 20 20">
                        <path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd"></path>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <div class="flex items-start justify-between gap-4">
        <div>
            <h1 class="text-lg font-semibold text-text-primary">Databases</h1>
            <p class="mt-0.5 text-xs text-text-secondary">Browse installed database plugins and inspect provisioned database instances.</p>
        </div>
        <a href="/databases/create"
           x-show="installedDbPlugins.length > 0"
           class="inline-flex h-8 items-center gap-1.5 rounded border border-brand-primary bg-brand-primary px-3 text-sm font-medium text-white transition-colors duration-150 hover:bg-brand-hover">
            Create Database
        </a>
    </div>

    <div x-show="installedDbPlugins.length === 0" class="rounded-md border border-border bg-card p-8 text-center">
        <div class="mx-auto flex max-w-md flex-col items-center">
            <svg class="mb-4 h-10 w-10 text-text-tertiary" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 7v10c0 2.21 3.582 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.582 4 8 4s8-1.79 8-4M4 7c0-2.21 3.582-4 8-4s8 1.79 8 4"></path>
            </svg>
            <h2 class="text-sm font-semibold text-text-primary">No Database Plugins Installed</h2>
            <p class="mt-1 text-sm text-text-secondary">Install a database plugin before creating and managing databases.</p>
            <a href="/plugins" class="mt-4 inline-flex h-8 items-center gap-1.5 rounded border border-brand-primary bg-brand-primary px-3 text-sm font-medium text-white transition-colors duration-150 hover:bg-brand-hover">
                Manage Plugins
            </a>
        </div>
    </div>

    <template x-if="installedDbPlugins.length > 0">
        <div class="space-y-5">
            <div class="border-b border-border">
                <div class="flex flex-wrap gap-1 -mb-px">
                    <template x-for="plugin in installedDbPlugins" :key="plugin">
                        <button @click="fetchDatabases(plugin)"
                                class="px-4 py-2.5 text-sm font-medium border-b-2 -mb-px transition-colors duration-100"
                                :class="activeTab === plugin ? 'border-brand-primary text-brand-primary' : 'border-transparent text-text-secondary hover:text-text-primary'">
                            <span x-text="plugin === 'mongo' ? 'MongoDB' : (plugin === 'postgres' ? 'PostgreSQL' : (plugin === 'mariadb' ? 'MariaDB' : (plugin.charAt(0).toUpperCase() + plugin.slice(1))))"></span>
                        </button>
                    </template>
                </div>
            </div>

            <div class="flex items-center justify-between gap-3">
                <h2 class="text-sm font-semibold text-text-primary" x-text="activeTab.charAt(0).toUpperCase() + activeTab.slice(1) + ' Databases'"></h2>
            </div>

            <div class="rounded-md border border-border bg-card overflow-hidden">
                <div class="w-full overflow-x-auto">
                    <table class="w-full text-sm">
                        <thead>
                            <tr class="border-b border-border">
                                <th class="px-4 py-2.5 text-left text-xs font-medium uppercase tracking-wide text-text-secondary">Name</th>
                                <th class="px-4 py-2.5 text-left text-xs font-medium uppercase tracking-wide text-text-secondary">Status</th>
                                <th class="px-4 py-2.5 text-left text-xs font-medium uppercase tracking-wide text-text-secondary">Version</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-border-subtle">
                            <template x-if="loading">
                                <tr>
                                    <td colspan="3" class="px-4 py-8 text-center">
                                        <div class="flex flex-col items-center justify-center gap-2">
                                            <div class="h-6 w-6 animate-spin rounded-sm border-2 border-border-strong border-t-transparent"></div>
                                            <p class="text-sm text-text-secondary">Loading databases...</p>
                                        </div>
                                    </td>
                                </tr>
                            </template>
                            <template x-if="!loading && (!databases || databases.length === 0)">
                                <tr>
                                    <td colspan="3" class="px-4 py-8 text-center text-sm text-text-secondary">
                                        No databases found for this type.
                                    </td>
                                </tr>
                            </template>
                            <template x-for="db in databases" :key="db.name">
                                <tr class="transition-colors duration-100 hover:bg-surface">
                                    <td class="px-4 py-2.5 whitespace-nowrap">
                                        <a :href="`/databases/${activeTab}/${db.name}`" class="font-mono text-[13px] text-link hover:underline" x-text="db.name"></a>
                                    </td>
                                    <td class="px-4 py-2.5 whitespace-nowrap">
                                        <span class="inline-flex items-center gap-1 px-2 py-0.5 rounded-sm text-xs font-medium"
                                              :class="db.status ? 'bg-status-success-bg text-status-success' : 'bg-status-danger-bg text-status-danger'">
                                            <span class="h-1.5 w-1.5 rounded-full" :class="db.status ? 'bg-status-success' : 'bg-status-danger'"></span>
                                            <span x-text="db.status ? 'Running' : 'Stopped'"></span>
                                        </span>
                                    </td>
                                    <td class="px-4 py-2.5 whitespace-nowrap font-mono text-[13px] text-text-secondary" x-text="db.version"></td>
                                </tr>
                            </template>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </template>
</div>
{{end}}
