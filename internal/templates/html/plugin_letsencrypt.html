{{define "content"}}
<div x-data="{
    globalEmail: '',
    autoRenew: false,
    showEmailModal: false,
    newEmail: '',
    isValidEmail: false,
    isProcessing: false,
    flashMessage: null,
    showFlash: false,
    async fetchInfo() {
        const response = await fetch('/api/plugins/letsencrypt/info');
        const data = await response.json();
        this.globalEmail = data.globalEmail;
        this.autoRenew = data.autoRenew;
    },
    validateEmail(email) {
        const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        this.isValidEmail = re.test(email);
    },
    setFlash(message, type = 'success') {
        this.flashMessage = { text: message, type: type };
        this.showFlash = true;
        setTimeout(() => this.showFlash = false, 5000);
    },
    async setGlobalEmail() {
        this.isProcessing = true;
        try {
            const response = await fetch('/api/plugins/letsencrypt/email', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ email: this.newEmail })
            });
            if (response.ok) {
                this.globalEmail = this.newEmail;
                this.showEmailModal = false;
                this.setFlash('Global email updated successfully');
            } else {
                const error = await response.json();
                this.setFlash(error.message || 'Failed to update email', 'error');
            }
        } catch (error) {
            this.setFlash(String(error), 'error');
        } finally {
            this.isProcessing = false;
        }
    },
    async setAutoRenew() {
        this.isProcessing = true;
        try {
            const response = await fetch('/api/plugins/letsencrypt/autorenew', {
                method: 'POST'
            });
            if (response.ok) {
                this.autoRenew = true;
                this.setFlash('Auto renew enabled successfully');
            } else {
                const error = await response.json();
                this.setFlash(error.message || 'Failed to enable auto renew', 'error');
            }
        } catch (error) {
            this.setFlash(String(error), 'error');
        } finally {
            this.isProcessing = false;
        }
    }
}" x-init="fetchInfo()" class="flex w-full max-w-4xl flex-col gap-6">
    <div>
        <h1 class="text-lg font-semibold text-text-primary">Let's Encrypt</h1>
        <p class="mt-0.5 text-xs text-text-secondary">Configure the global contact email and automatic certificate renewal.</p>
        <div class="mt-1.5 flex items-center gap-2">
            <span x-show="globalEmail" class="inline-flex items-center rounded-sm bg-brand-subtle px-2 py-0.5 text-xs font-medium text-brand-primary">Email configured</span>
            <span x-show="autoRenew" class="inline-flex items-center rounded-sm bg-status-success-bg px-2 py-0.5 text-xs font-medium text-status-success">Auto renew enabled</span>
        </div>
    </div>

    <div x-show="showFlash"
         x-transition:enter="transition ease-out duration-300"
         x-transition:enter-start="opacity-0 transform -translate-y-2"
         x-transition:enter-end="opacity-100 transform translate-y-0"
         x-transition:leave="transition ease-in duration-200"
         x-transition:leave-start="opacity-100 transform translate-y-0"
         x-transition:leave-end="opacity-0 transform -translate-y-2"
         class="fixed right-4 top-4 z-50"
         @click="showFlash = false">
        <div :class="{
            'border-status-success/30 bg-status-success-bg text-status-success': flashMessage?.type === 'success',
            'border-status-danger/30 bg-status-danger-bg text-status-danger': flashMessage?.type === 'error'
        }" class="flex items-start gap-3 rounded-md border px-4 py-3 text-sm shadow-dropdown">
            <p x-text="flashMessage?.text" class="flex-1"></p>
            <button class="text-text-tertiary transition-colors duration-150 hover:text-text-primary" @click="showFlash = false">
                <svg class="h-4 w-4" fill="currentColor" viewBox="0 0 20 20">
                    <path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd"></path>
                </svg>
            </button>
        </div>
    </div>

    <div class="rounded-md border border-border bg-card">
        <div class="w-full overflow-x-auto">
            <table class="w-full text-sm">
                <thead>
                    <tr class="border-b border-border">
                        <th class="px-4 py-2.5 text-left text-xs font-medium uppercase tracking-wide text-text-secondary">Setting</th>
                        <th class="px-4 py-2.5 text-left text-xs font-medium uppercase tracking-wide text-text-secondary">Value</th>
                        <th class="w-32 px-4 py-2.5 text-right text-xs font-medium uppercase tracking-wide text-text-secondary">Action</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-border-subtle">
                    <tr class="transition-colors duration-100 hover:bg-surface">
                        <td class="px-4 py-2.5 text-sm font-medium text-text-primary">Global Email</td>
                        <td class="px-4 py-2.5">
                            <div class="flex items-center gap-2 rounded border border-border bg-surface px-3 py-1.5 font-mono text-[13px] text-text-primary">
                                <span class="flex-1 truncate" x-text="globalEmail || 'Not set'"></span>
                            </div>
                        </td>
                        <td class="px-4 py-2.5 text-right">
                            <button @click="newEmail = globalEmail || ''; validateEmail(newEmail); showEmailModal = true" class="inline-flex h-8 items-center gap-1.5 rounded border border-border bg-card px-3 text-sm font-medium text-text-primary transition-colors duration-150 hover:bg-surface">
                                Edit
                            </button>
                        </td>
                    </tr>
                    <tr class="transition-colors duration-100 hover:bg-surface">
                        <td class="px-4 py-2.5 text-sm font-medium text-text-primary">Auto Renew</td>
                        <td class="px-4 py-2.5">
                            <span x-text="autoRenew ? 'Enabled' : 'Disabled'" :class="autoRenew ? 'text-status-success' : 'text-status-danger'" class="text-sm font-medium"></span>
                        </td>
                        <td class="px-4 py-2.5 text-right">
                            <button x-show="!autoRenew"
                                    @click="setAutoRenew()"
                                    :disabled="isProcessing"
                                    class="inline-flex h-8 items-center gap-1.5 rounded border border-brand-primary bg-brand-primary px-3 text-sm font-medium text-white transition-colors duration-150 hover:bg-brand-hover disabled:opacity-50">
                                <span x-text="isProcessing ? 'Enabling...' : 'Enable'"></span>
                            </button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div x-show="showEmailModal"
         class="fixed inset-0 z-50 flex items-center justify-center bg-[#1A2B3C]/30 p-4 backdrop-blur-sm"
         x-cloak>
        <div class="w-full max-w-md rounded-lg border border-border bg-card shadow-modal">
            <div class="flex items-center justify-between border-b border-border-subtle px-5 py-4">
                <h3 class="text-sm font-semibold text-text-primary">Set Global Email</h3>
                <button @click="showEmailModal = false" class="inline-flex h-7 w-7 items-center justify-center rounded text-text-tertiary transition-colors duration-150 hover:bg-surface hover:text-text-primary">
                    <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>
            <div class="px-5 py-4">
                <div class="flex flex-col gap-1.5">
                    <label for="email" class="text-xs font-medium text-text-secondary">Email Address</label>
                    <input type="email"
                           id="email"
                           x-model="newEmail"
                           @input="validateEmail($event.target.value)"
                           class="h-8 rounded border border-border bg-card px-3 text-sm text-text-primary placeholder:text-text-tertiary focus:border-brand-primary focus:outline-none focus:ring-1 focus:ring-brand-primary"
                           placeholder="admin@example.com">
                </div>
            </div>
            <div class="flex items-center justify-end gap-2 border-t border-border-subtle px-5 py-4">
                <button @click="showEmailModal = false"
                        type="button"
                        class="inline-flex h-8 items-center gap-1.5 rounded border border-border bg-card px-3 text-sm font-medium text-text-primary transition-colors duration-150 hover:bg-surface">
                    Cancel
                </button>
                <button @click="setGlobalEmail()"
                        :disabled="!isValidEmail || isProcessing"
                        type="button"
                        class="inline-flex h-8 items-center gap-1.5 rounded border border-brand-primary bg-brand-primary px-3 text-sm font-medium text-white transition-colors duration-150 hover:bg-brand-hover disabled:opacity-50">
                    <span x-text="isProcessing ? 'Saving...' : 'Save Email'"></span>
                </button>
            </div>
        </div>
    </div>
</div>
{{end}}
