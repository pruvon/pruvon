{{define "content"}}
<div class="flex min-h-screen items-center justify-center bg-surface px-4 py-6 sm:px-6 sm:py-10">
    <div class="relative mx-auto w-full max-w-[420px]">

        <div class="absolute bottom-full left-1/2 mb-8 w-full -translate-x-1/2 text-center">
            <svg class="mx-auto h-10 w-10" viewBox="0 0 200 200" role="img" aria-label="Pruvon logo">
                <rect width="200" height="200" rx="40" fill="#2D9B6F"></rect>
                <path fill="#FFFFFF" fill-rule="evenodd" d="M60 35H108C138 35 156 52 156 79C156 106 138 123 108 123H88V165H60ZM88 59H106C120 59 128 66 128 79C128 92 120 99 106 99H88Z"></path>
            </svg>
            <h1 class="mt-3 font-serif text-2xl text-text-primary">Pruvon</h1>
            <p class="mt-1 text-sm text-text-secondary">Dokku management dashboard</p>
        </div>

        <section class="w-full rounded-md border border-border bg-card p-6 shadow-none sm:p-7">
            <div class="mb-6">
                <h2 class="text-lg font-semibold text-text-primary">Sign in</h2>
                <p class="mt-1 text-sm text-text-secondary">Enter your administrator credentials to continue.</p>
            </div>

            {{if .Error}}
            <div class="mb-5 rounded-md border border-status-danger/30 bg-status-danger-bg p-3 text-sm text-status-danger">
                {{.Error}}
            </div>
            {{end}}

            <form action="/api/login" method="POST" class="flex flex-col gap-5">
                <div class="flex flex-col gap-1.5">
                    <label for="username" class="text-xs font-medium text-text-secondary">Username</label>
                    <input
                        id="username"
                        name="username"
                        type="text"
                        autocomplete="username"
                        required
                        class="h-8 rounded border border-border bg-card px-3 text-sm text-text-primary placeholder:text-text-tertiary focus:border-brand-primary focus:outline-none focus:ring-1 focus:ring-brand-primary"
                        placeholder="admin"
                    >
                </div>

                <div class="flex flex-col gap-1.5">
                    <label for="password" class="text-xs font-medium text-text-secondary">Password</label>
                    <input
                        id="password"
                        name="password"
                        type="password"
                        autocomplete="current-password"
                        required
                        class="h-8 rounded border border-border bg-card px-3 text-sm text-text-primary placeholder:text-text-tertiary focus:border-brand-primary focus:outline-none focus:ring-1 focus:ring-brand-primary"
                        placeholder="Enter your password"
                    >
                </div>

                <button
                    type="submit"
                    class="inline-flex h-8 items-center justify-center gap-1.5 rounded border border-brand-primary bg-brand-primary px-3 text-sm font-medium text-white transition-colors duration-150 hover:bg-brand-hover"
                >
                    Sign in
                </button>
            </form>

            {{if and (ne .GitHubClientID "") (ne .GitHubClientSecret "")}}
            <div class="my-6 border-t border-border-subtle"></div>

            <div class="space-y-3">
                <p class="text-xs text-text-secondary">GitHub OAuth is enabled for this installation.</p>
                <a
                    href="/auth/github"
                    class="inline-flex h-8 w-full items-center justify-center gap-1.5 rounded border border-border bg-card px-3 text-sm font-medium text-text-primary transition-colors duration-150 hover:bg-surface"
                >
                    <svg class="h-[14px] w-[14px]" fill="currentColor" viewBox="0 0 24 24">
                        <path fill-rule="evenodd" d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z"></path>
                    </svg>
                    <span>Continue with GitHub</span>
                </a>
            </div>
            {{end}}
        </section>
    </div>
</div>
{{end}}
