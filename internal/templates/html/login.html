{{define "content"}}
<div class="flex min-h-screen items-center justify-center bg-surface px-4 py-6 sm:px-6 sm:py-10">
    <div class="relative mx-auto w-full max-w-[420px]">

        <div class="absolute bottom-full left-1/2 mb-8 w-full -translate-x-1/2 text-center">
            <svg class="mx-auto h-10 w-10" viewBox="0 0 200 200" role="img" aria-label="Pruvon logo">
                <rect width="200" height="200" rx="40" fill="#2D9B6F"></rect>
                <path fill="#FFFFFF" fill-rule="evenodd" d="M60 35H108C138 35 156 52 156 79C156 106 138 123 108 123H88V165H60ZM88 59H106C120 59 128 66 128 79C128 92 120 99 106 99H88Z"></path>
            </svg>
            <h1 class="mt-3 font-serif text-2xl text-text-primary">Pruvon</h1>
            <p class="mt-1 text-sm text-text-secondary">Dokku management dashboard</p>
        </div>

        <section class="w-full rounded-md border border-border bg-card p-6 shadow-none sm:p-7">
            <div class="mb-6">
                <h2 class="text-lg font-semibold text-text-primary">Sign in</h2>
                <p class="mt-1 text-sm text-text-secondary">Enter your local username and password to continue.</p>
            </div>

            {{if .Error}}
            <div class="mb-5 rounded-md border border-status-danger/30 bg-status-danger-bg p-3 text-sm text-status-danger">
                {{.Error}}
            </div>
            {{end}}

            <form action="/api/login" method="POST" class="flex flex-col gap-5">
                <div class="flex flex-col gap-1.5">
                    <label for="username" class="text-xs font-medium text-text-secondary">Username</label>
                    <input
                        id="username"
                        name="username"
                        type="text"
                        autocomplete="username"
                        required
                        class="h-8 rounded border border-border bg-card px-3 text-sm text-text-primary placeholder:text-text-tertiary focus:border-brand-primary focus:outline-none focus:ring-1 focus:ring-brand-primary"
                        placeholder="admin"
                    >
                </div>

                <div class="flex flex-col gap-1.5">
                    <label for="password" class="text-xs font-medium text-text-secondary">Password</label>
                    <input
                        id="password"
                        name="password"
                        type="password"
                        autocomplete="current-password"
                        required
                        class="h-8 rounded border border-border bg-card px-3 text-sm text-text-primary placeholder:text-text-tertiary focus:border-brand-primary focus:outline-none focus:ring-1 focus:ring-brand-primary"
                        placeholder="Enter your password"
                    >
                </div>

                <button
                    type="submit"
                    class="inline-flex h-8 items-center justify-center gap-1.5 rounded border border-brand-primary bg-brand-primary px-3 text-sm font-medium text-white transition-colors duration-150 hover:bg-brand-hover"
                >
                    Sign in
                </button>
            </form>

        </section>
    </div>
</div>
{{end}}
