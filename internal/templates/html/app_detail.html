{{define "content"}}
<div class="mb-6 flex items-start justify-between gap-4">
    <div>
        <h1 class="text-lg font-semibold text-text-primary">{{.Name}}</h1>
        {{if .Description}}
        <p class="mt-0.5 text-xs text-text-secondary">{{.Description}}</p>
        {{else}}
        <p class="mt-0.5 text-xs text-text-secondary">Application detail and operational controls.</p>
        {{end}}
    </div>
</div>

<script>
// Initialize Alpine.js store for flash messages
function registerAppDetailFlashStore() {
    if (!window.Alpine) {
        return false;
    }

    window.Alpine.store('flash', {
        text: '',
        type: 'success',
        visible: false,
        show(message, type = 'success') {
            this.text = message;
            this.type = type;
            this.visible = true;

            // Auto-hide after 3 seconds
            setTimeout(() => {
                this.visible = false;
            }, 3000);
        }
    });

    return true;
}

if (!registerAppDetailFlashStore()) {
    document.addEventListener('alpine:init', registerAppDetailFlashStore, { once: true });
}
</script>

    },
    hasRedirectPlugin: false,

        }

            this.fetchData(nextTab);
        }

    enableSSL: false,

    showFlashMessage(message, type = 'success') {
        this.flashMessage = { text: message, type: type };
        this.showFlash = true;
        setTimeout(() => this.showFlash = false, 10000);
    },
    validateEnvForm() {
        let isValid = true;
        this.errors.newEnvName = '';
        this.errors.newEnvValue = '';

        if (!this.newEnvName.trim()) {
            this.errors.newEnvName = 'Variable name is required';
            isValid = false;
        }

        if (!this.newEnvValue.trim()) {
            this.errors.newEnvValue = 'Value is required';
            isValid = false;
        }

        return isValid;
    },
    async cachedFetch(url, forceRefresh = false, options = {}) {
        const cacheKey = url + JSON.stringify(options);

        if (!forceRefresh && this.pendingRequests[cacheKey]) {
            return this.pendingRequests[cacheKey].then(response => response.clone());
        }

        const promise = fetch(url, options).then(response => {
            delete this.pendingRequests[cacheKey];
            return response;
        }).catch(error => {
            delete this.pendingRequests[cacheKey];
            throw error;
        });

        this.pendingRequests[cacheKey] = promise;
        return promise;
    },
    async fetchStats() {
        try {
            const response = await this.cachedFetch(`/api/apps/{{.Name}}/stats`);
            this.stats = await response.json();
        } catch (error) {
            console.error('Error fetching stats:', error);
        }
    },
    initStatsUpdate() {
        this.fetchStats();
        this.statsInterval = setInterval(() => this.fetchStats(), 5000);
    },
    isRestartInProgress() {
        return !!(this.restartOperation && ['pending', 'restarting', 'verifying'].includes(this.restartOperation.state));
    },
    restartOperationTitle() {
        if (!this.restartOperation) {
            return '';
        }

        switch (this.restartOperation.state) {
            case 'pending':
                return 'Restart queued';
            case 'restarting':
                return 'Restarting';
            case 'verifying':
                return 'Checking health';
            case 'succeeded':
                return 'Restart completed';
            case 'failed':
                return 'Restart failed';
            default:
                return 'Restart status';
        }
    },
    clearRestartOperationPolling() {
        if (this.restartOperationPollTimeout) {
            clearTimeout(this.restartOperationPollTimeout);
            this.restartOperationPollTimeout = null;
        }
    },
    scheduleRestartOperationPoll(taskId) {
        this.clearRestartOperationPolling();
        this.restartOperationPollTimeout = setTimeout(() => {
            this.loadRestartOperation(taskId, true);
        }, 2000);
    },
    async loadRestartOperation(taskId = '', announceCompletion = false) {
        const query = taskId ? `?task_id=${encodeURIComponent(taskId)}` : '';

        try {
            const response = await fetch(`/api/apps/{{.Name}}/restart/operations${query}`);

            if (response.status === 404) {
                this.restartOperation = null;
                this.clearRestartOperationPolling();
                return;
            }

            if (!response.ok) {
                throw new Error('Failed to load restart operation');
            }

            const previousState = this.restartOperation ? this.restartOperation.state : '';
            const operation = await response.json();

            this.restartOperation = operation;

            if (this.isRestartInProgress()) {
                this.scheduleRestartOperationPoll(operation.id);
                return;
            }

            this.clearRestartOperationPolling();

            if (announceCompletion && previousState && previousState !== operation.state) {
                await this.loadAppDetails();
                if (this.activeTab === 'process') {
                    await this.fetchData('process', true);
                }
                this.showFlashMessage(operation.message, operation.state === 'failed' ? 'error' : 'success');
            }
        } catch (error) {
            console.error('Error loading restart operation:', error);
            if (announceCompletion && taskId) {
                this.showFlashMessage('Failed to track restart status', 'error');
            }
        }
    },
    async startTrackedRestart(processType = '') {
        let url = `/api/apps/{{.Name}}/restart/operations`;
        if (processType) {
            url += `?process_type=${encodeURIComponent(processType)}`;
        }

        const response = await fetch(url, {
            method: 'POST'
        });

        if (!response.ok) {
            let message = 'Failed to restart application';
            try {
                const data = await response.json();
                message = data.error || message;
            } catch (error) {
                console.error('Error parsing restart failure response:', error);
            }
            throw new Error(message);
        }

        const operation = await response.json();
        this.restartOperation = operation;
        if (operation.reused) {
            this.showFlashMessage('A restart is already in progress. Showing the current status.');
        }
        this.scheduleRestartOperationPoll(operation.id);
    },
    stopStatsUpdate() {
        if (this.statsInterval) {
            clearInterval(this.statsInterval);
        }
    },
    async fetchData(tab, forceRefresh = false) {
        this.activeTab = tab;
        if (tab === 'summary') {
            if (this.summaryLoading && !this.loadingSummary) {
                await this.loadAppDetails();
            }
            return;
        }
        if (tab === 'process') {
            try {
                const response = await this.cachedFetch(`/api/apps/{{.Name}}/${tab}`);
                const data = await response.json();
                this.processData = data.output;
                this.info = data.info;
                this.containers = data.containers;
            } catch (error) {
                console.error('Error:', error);
            }
            return;
        }
        if (tab === 'nginx' && this.nginxSubTab === 'domains') {
            try {
                const response = await this.cachedFetch(`/api/apps/{{.Name}}/domains`);
                const data = await response.json();
                this.domains = data.domains;
                this.redirects = data.redirects || [];
            } catch (error) {
                console.error('Error:', error);
                this.domains = [];
                this.redirects = [];
            }
            return;
        }
        if (tab === 'nginx') {
            try {
                const response = await this.cachedFetch(`/api/apps/{{.Name}}/nginx`);
                const data = await response.json();
                this.nginxConfigs = data.configs;

                try {
                    const sslResponse = await this.cachedFetch(`/api/apps/{{.Name}}/ssl`);
                    const sslData = await sslResponse.json();
                    this.sslInfo = {
                        active: sslData.active || false,
                        autorenew: sslData.autorenew || false,
                        email: sslData.email || '',
                        expiration: sslData.expiration || null
                    };
                } catch (sslError) {
                    console.error('Error fetching SSL info:', sslError);
                    this.sslInfo = { active: false, autorenew: false, email: '', expiration: null };
                }
            } catch (error) {
                console.error('Error:', error);
            }
            return;
        }
        if (tab === 'services') {
            if (!this.servicesLoaded && !this.loadingServices) {
                await this.loadServices();
            }
            return;
        }
        if (tab === 'cron') {
            try {
                const response = await this.cachedFetch(`/api/apps/{{.Name}}/cron`);
                const data = await response.json();
                this.cronJobs = data.jobs;
            } catch (error) {
                console.error('Error:', error);
            }
            return;
        }
        if (tab === 'resource') {
            return;
        }
        if (tab === 'docker-options') {
            const url = `/api/apps/{{.Name}}/docker-options`;
            const forceRefreshDockerOptions = this._shouldRefreshDockerOptions;

            if (forceRefreshDockerOptions) {
                this.clearCache(url);
                this._shouldRefreshDockerOptions = false;
            }

            const response = await this.cachedFetch(url, forceRefreshDockerOptions);
            const data = await response.json();
            this.dockerOptions = {
                build: data.build || [],
                deploy: data.deploy || [],
                run: data.run || []
            };
            return;
        }
        if (tab === 'ssl') {
            try {
                const response = await this.cachedFetch(`/api/apps/{{.Name}}/ssl-info`);
                if (response.ok) {
                    const data = await response.json();
                    this.sslInfo = {
                        active: data.active || false,
                        autorenew: data.autorenew || false,
                        email: data.email || '',
                        expiration: data.expiration || null
                    };
                }
            } catch (error) {
                console.error('Error fetching SSL info:', error);
                this.sslInfo = { active: false, autorenew: false, email: '', expiration: null };
            }
            return;
        }
        if (this[tab + 'Data']) return;

        try {
            const response = await this.cachedFetch(`/api/apps/{{.Name}}/${tab}`);
            const data = await response.json();
            this[tab + 'Data'] = data.output;
            if (tab === 'ports') {
                this.ports = data.ports;
            }
            if (tab === 'domains') {
                this.domains = data.domains;
            }
            if (tab === 'config') {
                this.envVars = data.vars;
            }
            if (tab === 'process') {
                this.info = data.info;
            }
            if (tab === 'storage') {
                this.info = data.info;
            }
        } catch (error) {
            console.error('Error:', error);
            this[tab + 'Data'] = 'Veri yüklenirken hata oluştu.';
        }
    },
    setupProcessUpdates() {
        this.updateInterval = setInterval(() => {
            if (this.activeTab === 'process') {
                this.fetchData('process');
            }
        }, 5000);
    },
    handleTerminalResize() {
        if (!this.terminalConnected || !this.fitAddon) {
            return;
        }

        this.fitAddon.fit();
        const dimensions = this.fitAddon.proposeDimensions();
        if (dimensions && this.terminalWs) {
            this.terminalWs.send(JSON.stringify({
                type: 'resize',
                data: {
                    cols: dimensions.cols,
                    rows: dimensions.rows
                }
            }));
        }
    },
    async init() {
        await Promise.all([
            (async () => {
                try {
                    const appJsonResponse = await this.cachedFetch(`/api/apps/{{.Name}}/app-json`);
                    const appJsonData = await appJsonResponse.json();
                } catch (error) {
                    console.error('Error fetching app.json:', error);
                }
            })(),

            this.loadServerDomain(),

            this.loadAppDetails(),

            this.loadRestartOperation(),

            this.loadDomains(),

            this.loadServices(),
        ]);

        this.setupProcessUpdates();

        this.statsInterval = setInterval(() => {
            if (this.activeTab === 'summary' && this.appDetails.deployed) {
                this.fetchStats().catch(console.error);
            }
        }, 5000);

        window.addEventListener('resize', () => this.handleTerminalResize());

        window.addEventListener('beforeunload', () => {
            if (this.updateInterval) clearInterval(this.updateInterval);
            if (this.statsInterval) clearInterval(this.statsInterval);
            this.clearRestartOperationPolling();
        });
    },
    startLogging() {
        this.showLogs = true;
        this.logsData = [];
        const wsProtocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        this.wsConnection = new WebSocket(`${wsProtocol}//${window.location.host}/ws/apps/{{.Name}}/logs`);

        this.wsConnection.onmessage = (event) => {
            this.logsData.push(event.data);
            if (this.logsData.length > 1000) {
                this.logsData.shift();
            }
            const logContainer = document.getElementById('logContainer');
            logContainer.scrollTop = logContainer.scrollHeight;
        };

        this.wsConnection.onclose = () => {
            this.showLogs = false;
        };
    },
    stopLogging() {
        if (this.wsConnection) {
            this.wsConnection.close();
        }
        this.showLogs = false;
    },
    async addEnvVar() {
        if (!this.validateEnvForm()) {
            return;
        }

        try {
            const response = await fetch(`/api/apps/{{.Name}}/config`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    name: this.newEnvName,
                    value: this.newEnvValue,
                    restart: this.restartApp
                })
            });
            if (response.ok) {
                this.showEnvModal = false;
                this.newEnvName = '';
                this.newEnvValue = '';
                this.restartApp = false;
                this.errors.newEnvName = '';
                this.errors.newEnvValue = '';
                this.configData = '';
                await this.fetchData('config');
            }
        } catch (error) {
            console.error('Error:', error);
        }
    },
    connectTerminal() {
        this.disconnectTerminal();

        this.terminal = new Terminal({
            cursorBlink: true,
            fontSize: 14,
            theme: {
                background: '#000000',
                foreground: '#ffffff'
            },
            allowProposedApi: true,
            cols: 100,
            rows: 30,
            convertEol: true,
            scrollback: 5000
        });

        this.fitAddon = new FitAddon.FitAddon();
        this.terminal.loadAddon(this.fitAddon);

        this.terminal.open(document.getElementById('terminal'));
        this.fitAddon.fit();

        const wsProtocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        this.terminalWs = new WebSocket(`${wsProtocol}//${window.location.host}/ws/apps/{{.Name}}/terminal`);
        this.terminalWs.binaryType = 'arraybuffer';

        this.terminalWs.onopen = () => {
            this.terminalConnected = true;

            this.terminalWs.send(JSON.stringify({
                type: 'set_env',
                data: {
                    TERM: 'xterm-256color'
                }
            }));

            const dimensions = this.fitAddon.proposeDimensions();
            if (dimensions) {
                this.terminalWs.send(JSON.stringify({
                    type: 'resize',
                    data: {
                        cols: dimensions.cols,
                        rows: dimensions.rows
                    }
                }));
            }

            const resizeObserver = new ResizeObserver(() => {
                if (this.fitAddon) {
                    this.fitAddon.fit();
                    const dimensions = this.fitAddon.proposeDimensions();
                    if (dimensions) {
                        this.terminalWs.send(JSON.stringify({
                            type: 'resize',
                            data: {
                                cols: dimensions.cols,
                                rows: dimensions.rows
                            }
                        }));
                    }
                }
            });

            resizeObserver.observe(document.getElementById('terminal'));

            this.terminal.onData(data => {
                this.terminalWs.send(data);
            });
        };

        this.terminalWs.onmessage = (event) => {
            const data = new Uint8Array(event.data);
            this.terminal.write(data);
        };

        this.terminalWs.onclose = () => {
            this.disconnectTerminal();
        };

        this.terminalWs.onerror = (error) => {
            console.error('WebSocket error:', error);
            this.disconnectTerminal();
        };
    },
    disconnectTerminal() {
        const terminalWs = this.terminalWs;
        this.terminalWs = null;

        if (terminalWs) {
            terminalWs.onclose = null;
            terminalWs.onerror = null;
            if (terminalWs.readyState === WebSocket.OPEN || terminalWs.readyState === WebSocket.CONNECTING) {
                terminalWs.close();
            }
        }

        if (this.terminal) {
            try {
                this.terminal.dispose();
            } catch (e) {
                console.log('Terminal disposal failed:', e);
            }
            this.terminal = null;
        }

        this.fitAddon = null;

        this.terminalConnected = false;
    },
    startNginxLogs(type) {
        this.showNginxLogs = true;
        this.nginxLogsData = [];
        const wsProtocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        this.nginxWsConnection = new WebSocket(`${wsProtocol}//${window.location.host}/ws/apps/{{.Name}}/nginx-logs/${type}`);

        this.nginxWsConnection.onmessage = (event) => {
            this.nginxLogsData.push(event.data);
            if (this.nginxLogsData.length > 1000) {
                this.nginxLogsData.shift();
            }
            const logContainer = document.getElementById('nginxLogContainer');
            logContainer.scrollTop = logContainer.scrollHeight;
        };

        this.nginxWsConnection.onclose = () => {
            this.showNginxLogs = false;
        };
    },
    stopNginxLogs() {
        if (this.nginxWsConnection) {
            this.nginxWsConnection.close();
        }
        this.showNginxLogs = false;
    },
    async addDomain() {
        this.domainError = '';
        const domain = this.newDomain.trim();

        if (!domain) {
            this.domainError = 'Domain name is required';
            return;
        }

        const domainRegex = /^((?!-))(xn--)?[a-z0-9][a-z0-9-_]{0,61}[a-z0-9]{0,1}\.(xn--)?([a-z0-9\-]{1,61}|[a-z0-9-]{1,30}\.[a-z]{2,})$/;
        if (!domainRegex.test(domain)) {
            this.domainError = 'Please enter a valid domain name (e.g., example.com)';
            return;
        }

        try {
            const response = await fetch(`/api/apps/{{.Name}}/domains`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    domain: domain
                })
            });

            if (response.ok) {
                if (this.enableSSL) {
                    await fetch(`/api/apps/{{.Name}}/ssl`, { method: 'POST' });
                }

                this.showDomainModal = false;
                this.newDomain = '';
                this.enableSSL = false;
                this.domainError = '';

                this.domainsData = '';
                await this.fetchData('domains');

                await this.fetchData(this.activeTab);
            } else {
                this.domainError = 'Failed to add domain';
            }
        } catch (error) {
            console.error('Error:', error);
            this.domainError = 'Failed to add domain';
        }
    },
    async fetchNginxPorts() {
        try {
            const response = await fetch(`/api/apps/{{.Name}}/ports`);
            const data = await response.json();
            this.ports = data.ports;
        } catch (error) {
            console.error('Error:', error);
        }
    },
    showScaleModal: false,
    scaleCounts: {},
    isScaling: false,
    processTypes: [],
    initializeScaleCounts() {
        this.processTypes = [...new Set(info.filter(i => i.name.startsWith('Status ')).map(i => {
            const match = i.name.match(/Status\s+(\w+)/);
            return match ? match[1] : null;
        }).filter(Boolean))];

        this.processTypes.forEach(type => {
            const statusInfo = info.find(i => i.name === `Status ${type}`);
            if (statusInfo) {
                const match = statusInfo.value.match(/\((\d+)\)/);
                this.scaleCounts[type] = match ? parseInt(match[1]) : 0;
            } else {
                this.scaleCounts[type] = 0;
            }
        });
    },
    showDeleteEnvModal: false,
    deleteEnvVar: null,
    restartOnDelete: false,
    async deleteEnvVarConfirm() {
        try {
            const response = await fetch(`/api/apps/{{.Name}}/config/${this.deleteEnvVar}`, {
                method: 'DELETE',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    restart: this.restartOnDelete
                })
            });

            if (response.ok) {
                this.showDeleteEnvModal = false;
                this.deleteEnvVar = null;
                this.restartOnDelete = false;
                this.configData = '';
                await this.fetchData('config');
                this.showFlashMessage('Environment variable deleted successfully');
            }
        } catch (error) {
            console.error('Error:', error);
        }
    },
    showDeleteModal: false,
    deleteData: false,
    deleteDb: false,
    confirmationName: '',
    isDeleting: false,
    async deleteApplication() {
        this.isDeleting = true;
        try {
            const response = await fetch(`/api/apps/{{.Name}}`, {
                method: 'DELETE',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({
                    deleteData: this.deleteData,
                    deleteDb: this.deleteDb
                })
            });

            if (response.ok) {
                const data = await response.json();
                if (data.success) {
                    localStorage.setItem('flashMessage', data.message);
                    localStorage.setItem('flashType', data.type);
                }
                window.location.href = '/apps';
            } else {
                const data = await response.json();
                this.showFlashMessage(data.error || 'Failed to delete application', 'error');
            }
        } catch (error) {
            console.error('Error:', error);
            this.showFlashMessage('Failed to delete application', 'error');
        } finally {
            this.isDeleting = false;
            this.showDeleteModal = false;
        }
    },
    async loadServices() {
        if (this.loadingServices || this.servicesLoaded) return;

        this.loadingServices = true;
        try {
            const response = await this.cachedFetch(`/api/apps/{{.Name}}/services`);
            const data = await response.json();
            this.linkedServices = data.services || [];
            this.servicesLoaded = true;
        } catch (error) {
            console.error('Error loading linked services:', error);
        } finally {
            this.loadingServices = false;
        }
    },
    async loadServerDomain() {
        try {
            const response = await this.cachedFetch('/api/server/domain');
            const data = await response.json();
            this.serverDomain = data.domain;
        } catch (error) {
            console.error('Error loading server domain:', error);
        }
    },
    async loadAppDetails() {
        this.loadingSummary = true;
        try {
            const response = await this.cachedFetch(`/api/apps/{{.Name}}/details`);
            const detailsData = await response.json();

            this.appDetails.deployed = detailsData.deployed;
            this.appDetails.running = detailsData.running;
            this.appDetails.createdAt = detailsData.createdAt;
            this.appDetails.lastDeployAt = detailsData.lastDeployAt;
            this.appDetails.processes = detailsData.processes || {};

            if (detailsData.deployed) {
                await this.fetchStats();
            }
        } catch (error) {
            console.error('Error loading app details:', error);
        } finally {
            this.summaryLoading = false;
            this.loadingSummary = false;
        }
    },
    async loadDomains() {
        try {
            const response = await this.cachedFetch(`/api/apps/{{.Name}}/domains`);
            const data = await response.json();
            this.domains = Array.isArray(data.domains) ? data.domains : [];
        } catch (error) {
            console.error('Error loading domains:', error);
            this.domains = [];
        }
    },
    async performAppAction(action, processType = '') {
        if (action === 'restart') {
            try {
                await this.startTrackedRestart(processType);
            } catch (error) {
                console.error('Error performing restart:', error);
                this.showFlashMessage(error.message || 'Failed to restart application', 'error');
            }
            return;
        }

        try {
            let url = `/api/apps/{{.Name}}/${action}`;
            if (processType) {
                url += `?process_type=${processType}`;
            }

            const response = await fetch(url, {
                method: 'POST'
            });

            if (response.ok) {
                await this.loadAppDetails();
                this.showFlashMessage(`Application ${action} operation successful`, 'success');
            } else {
                this.showFlashMessage(`Failed to ${action} application`, 'error');
            }
        } catch (error) {
            console.error(`Error performing ${action}:`, error);
            this.showFlashMessage(`Failed to ${action} application`, 'error');
        }
    },
    sslInfo: {
        active: false,
        autorenew: false,
        email: '',
        expiration: null
    },
    containers: [],
    deploymentLoading: false,
    newEnvSecret: false,
    _shouldRefreshDockerOptions: false,
    clearCache(url, options = {}) {
        const cacheKey = url + JSON.stringify(options);
        delete this.pendingRequests[cacheKey];
    },
    handleFileUpload(event) {
        const file = event.target.files[0];
        if (!file) {
            this.envFileError = 'No file selected';
            return;
        }

        if (file.size > 1024 * 1024) {
            this.envFileError = 'File size should be less than 1MB';
            return;
        }

        const reader = new FileReader();
        reader.onload = (e) => {
            this.fileContent = e.target.result;
            this.parseEnvFile(this.fileContent);
        };
        reader.onerror = () => {
            this.envFileError = 'Error reading file';
        };
        reader.readAsText(file);
    },
    parseEnvFile(content) {
        this.parsedEnvVars = [];
        this.envFileError = '';

        if (!content.trim()) {
            this.envFileError = 'File is empty';
            return;
        }

        const lines = content.split('\n');

        lines.forEach((line, index) => {
            line = line.trim();

            if (!line || line.startsWith('#')) {
                return;
            }

            const match = line.match(/^([^=]+)=(.*)$/);
            if (!match) {
                this.envFileError = `Line ${index + 1} is not in key=value format`;
                return;
            }

            const [_, key, value] = match;
            if (!key.trim()) {
                this.envFileError = `Line ${index + 1} has an empty key`;
                return;
            }

            this.parsedEnvVars.push({
                key: key.trim(),
                value: value
            });
        });

        if (this.parsedEnvVars.length === 0 && !this.envFileError) {
            this.envFileError = 'No valid environment variables found in file';
        }
    },
    async applyEnvVarsFromFile() {
        if (this.parsedEnvVars.length === 0) {
            this.envFileError = 'No valid environment variables to apply';
            return;
        }

        const validVars = this.parsedEnvVars.filter(env => env.key.trim() !== '');

        if (validVars.length === 0) {
            this.envFileError = 'No valid environment variables to apply';
            return;
        }

        try {
            let hasError = false;

            for (const env of validVars) {
                const response = await fetch(`/api/apps/{{.Name}}/config`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        key: env.key,
                        value: env.value,
                        restart: false
                    })
                });

                if (!response.ok) {
                    const error = await response.json();
                    console.error('Error:', error);
                    this.envFileError = `Failed to set ${env.key}: ${error.error || 'Unknown error'}`;
                    hasError = true;
                    break;
                }
            }

            if (!hasError && this.restartAppFromFile) {
                await fetch(`/api/apps/{{.Name}}/restart`, {
                    method: 'POST'
                });
            }

            if (!hasError) {
                // Reset form and close modal
                this.showEnvFileModal = false;
                this.envFileError = '';
                this.fileContent = '';
                this.parsedEnvVars = [];
                this.restartAppFromFile = false;

                // Reset the file input element
                const fileInput = document.getElementById('env-file-upload');
                if (fileInput) fileInput.value = '';

                // Fetch fresh data and update table
                const configResponse = await fetch(`/api/apps/{{.Name}}/config`);
                const configData = await configResponse.json();
                this.envVars = configData.vars;

                Alpine.store('flash').show('Environment variables added successfully', 'success');
            }
        } catch (err) {
            console.error('Error:', err);
            this.envFileError = 'Network error occurred';
        }
    }
}"
